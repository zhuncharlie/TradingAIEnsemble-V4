# *** DEPRECATED (Session 3, docs/adapter_management/ADAPTER_REGISTRY_MIGRATION_
# REPORT.md) — kept as a legacy set, NOT deleted, NOT silently changed. ***
# This file's selection philosophy (reproducibility > methodological diversity >
# paper relevance > popularity, per ADAPTER_SELECTION_REPORT.md §3, explicitly
# NOT gated on any star threshold) remains a legitimate, distinct alternative to
# the new Session-3-era popularity-first taxonomy and is NOT superseded outright —
