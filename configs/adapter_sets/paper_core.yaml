# which uses a stricter, differently-ordered rule (popularity gate is now a
# non-negotiable AND-condition, not a lowest-priority tiebreaker) and additionally
# requires point_in_time_class==R (this file's `finagent`/`tradingagents`/`fingpt`
# entries are point_in_time_class L, and `deepalpha`/`finclaw`/`universal_
