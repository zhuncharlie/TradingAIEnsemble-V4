# configs/adapter_registry.yaml
#
# Registry of all 26 production adapters under adapters/*.py.
# (example_stub_adapter.py excluded — reference stub, not a deliverable.)
#
# Provenance rule for every field below: populated only from (a) direct
# grep of adapters/*.py source (`upstream_repo`, `requires_env`,
# `questions_answered`), (b) a live GitHub REST API snapshot taken during
# this design pass (stars/forks/license/pushed_at), or (c) explicit
# statements inside an adapter's own module docstring (paper citations,
# category description, cost signal). Nothing here is inferred from
# general/world knowledge not stated in-repo — see
# docs/adapter_management/ADAPTER_SELECTION_REPORT.md §0 for the one
# specific case (`trademaster`) where a plausible-sounding external paper
# citation was deliberately excluded because it isn't stated in the file.
#
# stars_snapshot: live GitHub API pull, this design pass (dated below).
# live_status: results/unified_harness/unified_harness_summary.json,
#   run unified_harness_2026_07_18, as_of=2024-01-15, universe AAPL/MSFT/NVDA.
# point_in_time_class: R (replay-capable, arbitrary historical as_of) or
#   L (live/current-context-bound, cannot be honestly backfilled to a
#   historical date without fabricating information context) — per
#   docs/experiment_design/DATA_SPLIT_PROTOCOL.md §1. This is the closest
#   existing, already-verified proxy for "point-in-time status" and is
#   reused here rather than re-derived, per CLAUDE.md's instruction not to
#   silently duplicate an existing classification.
# cost_tier: LOW (CPU-only, no paid API, no heavy local training),
#   MEDIUM (local compute-heavy: GPU/CPU model training or GPU inference,
#   no recurring paid API cost), HIGH (requires a paid external LLM API
#   call per invocation — recurring $ cost that scales with usage,
#   independent of local compute needs).
#
# --- Fields added in the Session 3 pre-pilot-readiness registry upgrade ---
# Full derivation ledger, per-field evidence rule, and rationale for every
# field below this line: docs/adapter_management/REGISTRY_GAP_ANALYSIS.md.
# Nothing below was invented; every non-null/non-unknown value traces to a
# cited source file. `commit_status`/`popularity_gate_1000`/`popularity_tier`:
# mechanical from existing `commit`/`stars_snapshot`. `paper_status`/
# `paper_verification_source`: structured version of existing `paper` field,
# same in-file-only provenance rule. `field_provenance`: a pointer into
# PROJECT_SCHEMA_AUDIT.csv, not a duplicated copy (that CSV's own NATIVE/
# DERIVED/PARTIAL labels partially predate the later capability-recovery
# pass documented in ADAPTER_CAPABILITY_RECOVERY.md/NEW_ADAPTER_
# INTEGRATION.md, so this registry deliberately does not re-assert those
# labels as current — see the pointer's own `note`). `historical_replay_
# ready`/`controlled_track_eligible`/`eligibility_tier`/`eligibility_
# reasons`: mechanical functions of `point_in_time_class`+`live_status`+
# `popularity_gate_1000`, per DATA_SPLIT_PROTOCOL.md §5's tier definitions.
# `q4_policy_type` vs `execution_class`: SPLIT from the prior single
# `execution_class` field, which conflated a CONTRACT.PolicyType enum value
# with a rolling-execution-support taxonomy (STEPWISE/STATIC_ONLY/
# STEPWISE_UNSUPPORTED) — see REGISTRY_GAP_ANALYSIS.md §3. Re-derivation of
# `execution_class`'s new (rolling-support-only) values for the 13 Q4-
# bearing adapters draws on the real per-step decision counts already
# recorded in ADAPTER_CAPABILITY_RECOVERY.md/NEW_ADAPTER_INTEGRATION.md
# (e.g. "24 real decisions, 0 causality violations" for qlib), not
# re-invented. `supported_horizons`: `unknown` for all 26 — a genuine,
# disclosed gap (no adapter's evidence states a specific 1d/5d/20d
# capability), not a guess. `estimated_pilot_cost`: `unknown` for all 26 —
# no adapter in this roster has ever been run to completion under a metered
# cost tracker; a placeholder number would be fabrication, not an estimate.

schema_version: "1.1.0"
snapshot_date: "2026-07-19"
snapshot_source: "live GitHub REST API (api.github.com/repos/{owner}/{repo}), this design pass"
registry_upgrade_date: "2026-07-20"
registry_upgrade_source: "docs/adapter_management/REGISTRY_GAP_ANALYSIS.md (Session 3, pre-pilot readiness, Task C) — additive upgrade only, no existing field value changed except the execution_class split documented above"
adapter_count: 26
excluded_from_roster:
  - name: "Alpha-GFN"
    reason: "deferred, demo-level — never reached adapter status (ADAPTER_CAPABILITY_RECOVERY.md)"
  - name: "real NoFx (NoFxAiOS/nofx)"
