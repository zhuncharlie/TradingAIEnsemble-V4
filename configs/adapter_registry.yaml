# configs/adapter_registry.yaml
#
# Registry of all 26 production adapters under adapters/*.py.
# (example_stub_adapter.py excluded — reference stub, not a deliverable.)
#
# Provenance rule for every field below: populated only from (a) direct
# grep of adapters/*.py source (`upstream_repo`, `requires_env`,
# `questions_answered`), (b) a live GitHub REST API snapshot taken during
# this design pass (stars/forks/license/pushed_at), or (c) explicit
# statements inside an adapter's own module docstring (paper citations,
# category description, cost signal). Nothing here is inferred from
# general/world knowledge not stated in-repo — see
# docs/adapter_management/ADAPTER_SELECTION_REPORT.md §0 for the one
# specific case (`trademaster`) where a plausible-sounding external paper
# citation was deliberately excluded because it isn't stated in the file.
#
# stars_snapshot: live GitHub API pull, this design pass (dated below).
# live_status: results/unified_harness/unified_harness_summary.json,
#   run unified_harness_2026_07_18, as_of=2024-01-15, universe AAPL/MSFT/NVDA.
# point_in_time_class: R (replay-capable, arbitrary historical as_of) or
#   L (live/current-context-bound, cannot be honestly backfilled to a
#   historical date without fabricating information context) — per
#   docs/experiment_design/DATA_SPLIT_PROTOCOL.md §1. This is the closest
#   existing, already-verified proxy for "point-in-time status" and is
#   reused here rather than re-derived, per CLAUDE.md's instruction not to
#   silently duplicate an existing classification.
# cost_tier: LOW (CPU-only, no paid API, no heavy local training),
#   MEDIUM (local compute-heavy: GPU/CPU model training or GPU inference,
#   no recurring paid API cost), HIGH (requires a paid external LLM API
#   call per invocation — recurring $ cost that scales with usage,
#   independent of local compute needs).

schema_version: "1.0.0"
snapshot_date: "2026-07-19"
snapshot_source: "live GitHub REST API (api.github.com/repos/{owner}/{repo}), this design pass"
